<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automa Story Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}
body{
    background:linear-gradient(135deg,#0b0b0b,#111,#0f2027);
    color:white;
    min-height:100vh;
}
.container{
    width:92%;
    max-width:900px;
    margin:30px auto;
}
h1{
    text-align:center;
    color:#00d8a7;
    margin-bottom:25px;
    font-size:32px;
}

/* GUIAS CLIENTES */
.tabs{
    display:flex;
    gap:8px;
    overflow-x:auto;
    margin-bottom:25px;
    padding-bottom:8px;
}
.tab{
    background:#1d1d1d;
    padding:12px 22px;
    border-radius:12px 12px 0 0;
    cursor:pointer;
    white-space:nowrap;
    transition:.3s;
    border:1px solid rgba(255,255,255,0.04);
}
.tab:hover{
    background:#252525;
}
.tab.active{
    background:#00b894;
    color:white;
    font-weight:bold;
}

.card,.logs{
    background:#171717;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.5);
    margin-bottom:20px;
}
label{
    display:block;
    margin-top:18px;
    margin-bottom:8px;
    font-size:14px;
}
input{
    width:100%;
    padding:13px;
    background:#2a2a2a;
    border:none;
    border-radius:8px;
    color:white;
}

.horarioBox{
    display:flex;
    align-items:center;
    gap:10px;
}
.horarioBox input{
    width:90px;
    text-align:center;
    font-size:20px;
}

button{
    width:100%;
    padding:16px;
    margin-top:30px;
    background:#00b894;
    border:none;
    border-radius:8px;
    color:white;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}
button:hover{
    opacity:0.9;
}

#status{
    color:#00ffbf;
    margin-top:10px;
}
.infoCliente{
    margin-top:15px;
    font-size:14px;
    color:#bdbdbd;
}
</style>
</head>
<body>

<div class="container">

<h1>📲 AUTOMA STORY DASHBOARD</h1>

<div class="tabs" id="tabsClientes"></div>

<div class="card">

<div class="infoCliente" id="infoCliente">Nenhum cliente selecionado.</div>

<label>Selecionar Imagem/Vídeo Story</label>
<input type="file" id="midia" accept="image/*,video/*">

<label>Escolher Data</label>
<input type="date" id="data">

<label>Escolher Horário</label>
<div class="horarioBox">
    <input type="number" id="hora" min="0" max="23" placeholder="HH">
    <span style="font-size:22px;">:</span>
    <input type="number" id="minuto" min="0" max="59" placeholder="MM">
</div>

<button onclick="agendarStory()">⏰ AGENDAR STORY</button>

</div>

<div class="logs">
<h3>Status do Sistema</h3>
<div id="status">Inicializando dashboard...</div>
</div>

</div>

<script>

// ===============================
// PLANILHA DE CLIENTES
// ===============================

const clientes = [
    {
        id:"perfil_test",
        nome:"perfil_test",
        usuario:"perfil_test_1234",
        senha:"16861@Lemniscata"
    },
    {
        id:"cred1",
        nome:"Cred Curitiba",
        usuario:"credcuritiba",
        senha:"654321"
    },
    {
        id:"lojafit",
        nome:"Loja Fit",
        usuario:"lojafit",
        senha:"112233"
    }
];

let clienteSelecionado = null;

// ===============================
// CRIAR ABAS
// ===============================

function carregarAbas(){

    let html = '';

    clientes.forEach((c,index)=>{
        html += `<div class="tab ${index===0?'active':''}" onclick="selecionarCliente('${c.id}', this)">${c.nome}</div>`;
    });

    document.getElementById("tabsClientes").innerHTML = html;

    clienteSelecionado = clientes[0];
    atualizarInfo();
    document.getElementById("status").innerHTML = "✅ Clientes carregados.";
}

function selecionarCliente(id, elemento){

    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    elemento.classList.add('active');

    clienteSelecionado = clientes.find(c=>c.id === id);
    atualizarInfo();
}

function atualizarInfo(){
    document.getElementById("infoCliente").innerHTML =
        `Conta Selecionada: <b>${clienteSelecionado.nome}</b> | @${clienteSelecionado.usuario}`;
}

carregarAbas();

// ===============================
// AGENDAR STORY
// ===============================

async function agendarStory(){

    const status = document.getElementById("status");

    const midia = document.getElementById("midia").files[0];
    const data = document.getElementById("data").value;
    const hora = document.getElementById("hora").value.padStart(2,'0');
    const minuto = document.getElementById("minuto").value.padStart(2,'0');

    if(!midia || !data || hora=='' || minuto==''){
        status.innerHTML = "⚠️ Preencha todos os campos.";
        return;
    }

    status.innerHTML = "📤 Enviando story agendado...";

    const formData = new FormData();
    formData.append("cliente", clienteSelecionado.id);
    formData.append("usuario", clienteSelecionado.usuario);
    formData.append("senha", clienteSelecionado.senha);
    formData.append("data", data);
    formData.append("hora", hora);
    formData.append("minuto", minuto);
    formData.append("midia", midia);

    try{

        const req = await fetch('/api/agendar-story',{
            method:'POST',
            body:formData
        });

        const resposta = await req.text();
        status.innerHTML = "✅ " + resposta;

    }catch(e){
        status.innerHTML = "❌ Erro ao enviar agendamento.";
    }
}

</script>

</body>
</html>
