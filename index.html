<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automa Insta Panel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:700px;
    margin:40px auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:32px;
}

.card{
    background:#1b1b1b;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
    font-size:15px;
}

input, select, textarea{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2b2b2b;
    color:white;
    font-size:14px;
}

textarea{
    resize:none;
}

button{
    margin-top:20px;
    width:100%;
    padding:15px;
    background:#00b894;
    border:none;
    border-radius:8px;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    opacity:0.8;
}

.logs{
    margin-top:30px;
    background:#1b1b1b;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
}

#status{
    margin-top:10px;
    color:#00ffbf;
    word-break:break-word;
}
</style>
</head>
<body>

<div class="container">
    <h1>📲 AUTOMA INSTAGRAM PANEL</h1>

    <div class="card">
        <label>Selecionar Cliente/Conta</label>
        <select id="cliente">
            <option value="cliente1">Cliente 1</option>
            <option value="cliente2">Cliente 2</option>
        </select>

        <label>Selecionar Imagem/Vídeo</label>
        <input type="file" id="midia">

        <label>Legenda da Postagem</label>
        <textarea id="legenda" rows="6" placeholder="Digite a legenda..."></textarea>

        <button onclick="publicarAgora()">🚀 PUBLICAR AGORA</button>
    </div>

    <div class="logs">
        <h3>Status</h3>
        <div id="status">Aguardando ação...</div>
    </div>
</div>

<script>
	const GITHUB_TOKEN = "COLOCAR_TOKEN_NO_SERVIDOR";
	const REPO = "SEUUSUARIO/automa";

	async function publicarAgora(){
 	   document.getElementById("status").innerHTML = "Preparando envio...";

    	const cliente = document.getElementById("cliente").value;
    	const legenda = document.getElementById("legenda").value;
    	const midia = document.getElementById("midia").files[0];

    	if(!midia){
        	document.getElementById("status").innerHTML = "Selecione uma mídia.";
        	return;
    	}

    	const reader = new FileReader();

    	reader.onload = async function(){
        	const base64File = reader.result.split(',')[1];

	        const nomeArquivo = Date.now() + "_" + midia.name;

	        // UPLOAD DA MIDIA
        	await fetch(`https://api.github.com/repos/${REPO}/contents/data/midias/${nomeArquivo}`,{
            	method:"PUT",
            	headers:{
                	"Authorization":"token " + GITHUB_TOKEN,
                	"Content-Type":"application/json"
            	},
            	body:JSON.stringify({
                	message:"upload midia",
                	content:base64File
            	})
        	});

        	// CRIAR JSON DA POSTAGEM
	        const postagem = {
            	cliente:cliente,
            	legenda:legenda,
            	arquivo:nomeArquivo,
            	data:new Date().toISOString(),
            	status:"pendente"
        	};

	        const jsonBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(postagem,null,2))));
        	const nomeJson = Date.now() + ".json";

	        await fetch(`https://api.github.com/repos/${REPO}/contents/data/posts/${nomeJson}`,{
        	    method:"PUT",
            	headers:{
                	"Authorization":"token " + GITHUB_TOKEN,
                	"Content-Type":"application/json"
            	},
            	body:JSON.stringify({
                	message:"nova postagem",
                	content:jsonBase64
           	 })
        	});

	        document.getElementById("status").innerHTML = "Dados enviados ao GitHub com sucesso!";
    	}

	    reader.readAsDataURL(midia);
	}
</script>

</body>
</html>
